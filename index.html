<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокируем зум двумя пальцами, чтобы приложение ощущалось как нативное -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findel</title>
    
    <!-- Подключаем Tailwind CSS для быстрой верстки классами -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Иконки FontAwesome (бургер, мотоцикл и т.д.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Шрифты Google: Inter (для текста) и Space Grotesk (для крутых больших цифр) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Подключаем manifest.json -->
    <link rel="manifest" href="/Findel/manifest.json">
</head>
<!-- ============================================================================== -->
<body class="h-screen w-full overflow-x-hidden flex flex-col relative mx-auto max-w-md bg-black">

    <!-- === HEADER === -->
    <header class="px-5 pt-8 pb-4 flex justify-between items-center bg-black/50 backdrop-blur-md z-10 w-full shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-orange-500"></div>
            <h1 class="font-display font-bold text-xl tracking-wide text-white">FINDEL</h1>
        </div>
        <div id="clock" class="text-sm text-gray-400 font-mono">00:00</div>
    </header>

    <!-- === MAIN CONTENT AREA === -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden no-scrollbar w-full pb-24 flex flex-col" id="app-container">
        
        <!-- SECTION: WORK (DELIVERY) -->
        <section id="section-work" class="h-full flex flex-col px-5 fade-in w-full">
            <!-- Stats Card -->
            <div class="mt-4 p-5 rounded-3xl bg-neutral-900 border border-neutral-800 text-center shadow-lg relative overflow-hidden shrink-0">
                <div id="rate-glow" class="absolute inset-0 opacity-10 blur-xl transition-colors duration-500 bg-transparent"></div>
                
                <div class="relative z-10">
                    <p class="text-gray-400 text-sm font-medium mb-1">ТЕКУЩИЙ РЕЙТ <span class="text-[10px] text-neutral-600 ml-1">(-15%)</span></p>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="hourly-rate" class="font-display text-6xl font-bold text-white transition-all duration-300">0</span>
                        <span class="text-xl text-gray-500">₸/ч</span>
                    </div>
                    
                    <div class="mt-6 flex justify-between items-end border-t border-neutral-800 pt-4">
                        <div class="text-left">
                            <div class="text-xs text-gray-500 uppercase">Время</div>
                            <div id="session-timer" class="font-mono text-xl text-white">00:00:00</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-500 uppercase">Чистыми</div>
                            <div class="font-display text-2xl text-green-400 font-bold"><span id="total-earned">0</span> ₸</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Swipe and Actions -->
            <div class="mt-6 w-full shrink-0 flex flex-col gap-3">
                <div id="swipe-container" class="relative w-full h-16 bg-white rounded-2xl overflow-hidden shadow-lg flex items-center justify-center transition-colors duration-300">
                    <div id="swipe-text" class="text-black font-bold text-lg pointer-events-none z-10 transition-colors duration-300">НАЧАТЬ СМЕНУ</div>
                    <div id="swipe-thumb" class="absolute left-1 top-1 bottom-1 w-14 bg-neutral-900 rounded-xl flex items-center justify-center cursor-pointer z-20 shadow-md">
                        <i id="swipe-icon" class="fa-solid fa-chevron-right text-white"></i>
                    </div>
                </div>
                
                <!-- Кнопки Паузы и Вывода -->
                <div id="action-buttons" class="hidden flex gap-3 w-full">
                    <button id="btn-pause" onclick="togglePause()" class="flex-1 tap-effect py-3 rounded-2xl bg-neutral-900 border border-neutral-800 text-gray-400 font-bold text-sm tracking-widest uppercase transition-colors">
                        ПАУЗА
                    </button>
                    <button onclick="showExport()" class="flex-1 tap-effect py-3 rounded-2xl bg-neutral-900 border border-neutral-800 text-blue-500 font-bold text-sm tracking-widest uppercase transition-colors hover:bg-blue-900/20">
                        ВЫВОД
                    </button>
                </div>
            </div>

            <!-- Список заказов -->
            <div id="current-orders-list" class="flex-1 min-h-[80px] overflow-y-auto w-full my-4 space-y-2 no-scrollbar">
                <!-- Заказы текущей смены -->
            </div>

            <!-- Order Input Area -->
            <div id="order-input-area" class="mt-auto mb-6 opacity-50 pointer-events-none transition-opacity duration-300 w-full shrink-0">
                <label class="block text-gray-400 text-sm mb-2 ml-1">Сумма заказа</label>
                <div class="flex items-stretch gap-2 w-full">
                    <input type="number" id="order-amount" placeholder="0" class="flex-1 min-w-0 bg-neutral-800 text-white text-center font-display text-3xl p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500 placeholder-neutral-600 transition-all">
                    <button class="tap-effect shrink-0 w-16 bg-neutral-800 rounded-2xl text-orange-500 text-2xl border border-neutral-700" onclick="addOrder()">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- SECTION: SPEND (FINANCE) -->
        <section id="section-spend" class="hidden h-full flex flex-col px-5 fade-in w-full">
            <div class="mt-8 mb-6 text-center">
                <input type="number" id="expense-amount" placeholder="0" class="w-full bg-transparent text-white text-center font-display text-7xl font-bold focus:outline-none placeholder-neutral-800 caret-orange-500" inputmode="numeric">
                <p class="text-gray-500 text-sm mt-2">введите сумму траты</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6 shrink-0">
                <button onclick="selectCategory('food', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-orange-500/50 transition-colors">
                    <i class="fa-solid fa-burger text-2xl text-gray-400 group-[.active]:text-orange-400"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Еда</span>
                </button>
                <button onclick="selectCategory('bike', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-blue-500/50 transition-colors">
                    <i class="fa-solid fa-motorcycle text-2xl text-gray-400 group-[.active]:text-blue-400"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Байк</span>
                </button>
                <button onclick="selectCategory('family', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-purple-500/50 transition-colors">
                    <i class="fa-solid fa-house-chimney text-2xl text-gray-400 group-[.active]:text-purple-400"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Дом/Семья</span>
                </button>
                <button onclick="selectCategory('credit', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-red-500/50 transition-colors">
                    <i class="fa-solid fa-file-invoice-dollar text-2xl text-gray-400 group-[.active]:text-red-400"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Кредит</span>
                </button>
                <button onclick="selectCategory('other', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-gray-500/50 transition-colors">
                    <i class="fa-solid fa-ghost text-2xl text-gray-400 group-[.active]:text-gray-200"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Хаос</span>
                </button>
                 <button onclick="selectCategory('subs', this)" class="cat-btn tap-effect p-4 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group hover:border-pink-500/50 transition-colors">
                    <i class="fa-solid fa-wifi text-2xl text-gray-400 group-[.active]:text-pink-400"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-white">Связь</span>
                </button>
            </div>

            <div class="mt-auto pb-4 shrink-0">
                <input type="text" id="expense-item" placeholder="На что? (например: Молоко)" class="w-full bg-neutral-900 text-white p-4 rounded-xl border border-neutral-800 focus:outline-none focus:border-orange-500 mb-4 text-center">
                <button onclick="saveExpense()" class="tap-effect w-full py-4 rounded-2xl bg-orange-600 text-white font-bold text-lg shadow-lg shadow-orange-900/20">
                    ЗАПИСАТЬ ТРАТУ
                </button>
            </div>
        </section>

        <!-- SECTION: STATUS (CREDIT & HISTORY) -->
        <section id="section-status" class="hidden h-full px-5 fade-in overflow-y-auto pb-20 w-full">
            <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4 mt-6">Прогресс Босса</h2>
            
            <div class="bg-neutral-900 p-5 rounded-2xl border border-neutral-800 mb-4 relative overflow-hidden">
                <div class="flex justify-between items-end mb-2 relative z-10">
                    <span class="text-white font-medium">Платеж (Месяц)</span>
                    <span class="text-orange-400 font-mono"><span id="month-paid">0</span> / 120 000</span>
                </div>
                <div class="w-full h-3 bg-neutral-800 rounded-full overflow-hidden relative z-10">
                    <div id="bar-month" class="h-full bg-orange-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-neutral-900 p-5 rounded-2xl border border-neutral-800 mb-8 relative overflow-hidden">
                <div class="flex justify-between items-end mb-2 relative z-10">
                    <span class="text-white font-medium">Полный долг</span>
                    <span class="text-red-400 font-mono"><span id="total-paid">0</span> / <span id="total-debt-val">2 000 000</span></span>
                </div>
                <div class="w-full h-3 bg-neutral-800 rounded-full overflow-hidden relative z-10">
                    <div id="bar-total" class="h-full bg-red-600 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">История (Последние 5)</h2>
            <div id="history-list" class="space-y-3"></div>
            
             <button onclick="clearAllData()" class="mt-10 w-full py-3 rounded-xl border border-red-900/30 text-red-700 text-xs uppercase tracking-widest hover:bg-red-900/10">
                Сброс данных (Осторожно)
            </button>
        </section>
    </main>

    <!-- === MODAL: ВЫВОД (EXPORT) === -->
    <div id="export-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-5 opacity-0 transition-opacity duration-300">
        <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col gap-4 relative">
            <h3 class="text-white font-bold text-lg text-center">Отчет о смене</h3>
            <textarea id="export-text" class="w-full bg-black text-gray-300 p-4 rounded-xl font-mono text-xs h-32 resize-none focus:outline-none border border-neutral-800" readonly></textarea>
            
            <div class="flex gap-2">
                <button onclick="closeExport()" class="flex-1 py-3 rounded-xl bg-neutral-800 text-gray-400 font-bold text-sm tracking-widest uppercase">
                    ЗАКРЫТЬ
                </button>
                <button id="btn-copy" onclick="copyExport()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm tracking-widest uppercase transition-colors">
                    КОПИРОВАТЬ
                </button>
            </div>
        </div>
    </div>

    <!-- === BOTTOM NAVIGATION === -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-[calc(28rem-3rem)] h-16 bg-neutral-900/90 backdrop-blur-xl border border-white/10 rounded-2xl flex justify-around items-center z-50 shadow-2xl">
        <button onclick="switchTab('work')" id="nav-work" class="nav-btn text-orange-500 flex flex-col items-center gap-1 w-16">
            <i class="fa-solid fa-bolt text-xl"></i>
            <span class="text-[10px] font-bold">WORK</span>
        </button>
        <button onclick="switchTab('spend')" id="nav-spend" class="nav-btn text-gray-500 flex flex-col items-center gap-1 w-16 transition-colors hover:text-gray-300">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">SPEND</span>
        </button>
        <button onclick="switchTab('status')" id="nav-status" class="nav-btn text-gray-500 flex flex-col items-center gap-1 w-16 transition-colors hover:text-gray-300">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[10px] font-bold">STATUS</span>
        </button>
    </nav>

    <script>
        //server worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker зарегистрирован!', reg))
                .catch(err => console.log('Ошибка регистрации SW:', err));
            });
        }
    </script>
</body>
</html>
