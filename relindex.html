<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/Findel/manifest.json">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #e5e5e5;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .legendary-text {
            background: linear-gradient(to right, #a855f7 20%, #f472b6 40%, #a855f7 60%, #3b82f6 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-effect:active { transform: scale(0.96); transition: transform 0.1s; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-full overflow-x-hidden flex flex-col relative mx-auto max-w-md bg-black">

    <!-- === HEADER === -->
    <header class="px-5 pt-8 pb-4 flex justify-between items-center bg-black/50 backdrop-blur-md z-10 w-full shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <h1 class="font-display font-bold text-xl tracking-wide text-white">FINDEL;</h1>
        </div>
        <div id="clock" class="text-sm text-gray-400 font-mono">00:00</div>
    </header>

    <!-- === MAIN CONTENT AREA === -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden no-scrollbar w-full pb-24 flex flex-col" id="app-container">
        
        <!-- SECTION: WORK (DELIVERY) -->
        <section id="section-work" class="h-full flex flex-col px-5 fade-in w-full">
            <div class="flex-1 overflow-y-auto no-scrollbar w-full flex flex-col pb-4">
                
                <div class="p-5 rounded-3xl bg-neutral-900 border border-neutral-800 text-center shadow-lg relative overflow-hidden shrink-0 mt-4">
                    <div id="rate-glow" class="absolute inset-0 opacity-10 blur-xl transition-colors duration-500 bg-transparent"></div>
                    
                    <div class="relative z-10">
                        <p class="text-gray-400 text-sm font-medium mb-1">ТЕКУЩИЙ РЕЙТ <span class="text-[10px] text-neutral-600 ml-1">(-15%)</span></p>
                        <div class="flex items-baseline justify-center gap-1">
                            <span id="hourly-rate" class="font-display text-6xl font-bold text-white transition-all duration-300">0</span>
                            <span class="text-xl text-gray-500">₸/ч</span>
                        </div>
                        
                        <div class="mt-6 flex justify-between items-end border-t border-neutral-800 pt-4">
                            <div class="text-left">
                                <div class="text-xs text-gray-500 uppercase">Время</div>
                                <div id="session-timer" class="font-mono text-xl text-white">00:00:00</div>
                            </div>
                            
                            <div class="text-center">
                                <div class="text-xs text-gray-500 uppercase">Осталось</div>
                                <div id="orders-left" class="font-mono text-xl text-white">~</div>
                            </div>
                            
                            <div class="text-right">
                                <div class="text-xs text-gray-500 uppercase">Чистыми</div>
                                <div class="font-display text-2xl text-green-400 font-bold"><span id="total-earned">0</span> ₸</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6 w-full shrink-0 flex flex-col gap-3">
                    <div id="action-buttons" class="flex gap-3 w-full">
                        <button id="btn-pause" onclick="togglePause()" class="w-16 h-14 shrink-0 rounded-2xl bg-neutral-900 border border-neutral-800 flex items-center justify-center transition-colors tap-effect">
                            <i id="pause-icon" class="fa-solid fa-pause text-gray-600 text-xl"></i>
                        </button>
                        <button onclick="openDataSection()" class="flex-1 tap-effect h-14 rounded-2xl bg-neutral-900 border border-neutral-800 text-gray-400 font-bold text-sm tracking-widest uppercase transition-colors hover:bg-neutral-800">
                            ДАННЫЕ
                        </button>
                    </div>

                    <div id="swipe-container" class="relative w-full h-16 bg-white rounded-2xl overflow-hidden shadow-lg flex items-center justify-center transition-colors duration-300">
                        <div id="swipe-text" class="text-black font-bold text-lg pointer-events-none z-10 transition-colors duration-300">НАЧАТЬ СМЕНУ</div>
                        <div id="swipe-thumb" class="absolute left-1 top-1 bottom-1 w-14 bg-neutral-900 rounded-xl flex items-center justify-center cursor-pointer z-20 shadow-md">
                            <i id="swipe-icon" class="fa-solid fa-chevron-right text-white"></i>
                        </div>
                    </div>
                </div>

                <div id="current-orders-list" class="w-full mt-4 mb-2 space-y-2"></div>
            </div>

            <div id="order-input-area" class="mt-2 mb-6 opacity-50 pointer-events-none transition-opacity duration-300 w-full shrink-0">
                <label class="block text-gray-400 text-sm mb-2 ml-1">Сумма заказа</label>
                <div class="flex items-stretch gap-2 w-full">
                    <input type="number" id="order-amount" placeholder="0" class="flex-1 min-w-0 bg-neutral-800 text-white text-center font-display text-3xl p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-green-500 placeholder-neutral-600 transition-all">
                    <button class="tap-effect shrink-0 w-16 bg-neutral-800 rounded-2xl text-green-500 text-2xl border border-neutral-700" onclick="addOrder()">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- SECTION: SPEND (FINANCE) -->
        <section id="section-spend" class="hidden h-full flex flex-col px-5 fade-in w-full">
            <div class="mb-6 text-center mt-4">
                <input type="number" id="expense-amount" placeholder="0" class="w-full bg-transparent text-white text-center font-display text-7xl font-bold focus:outline-none placeholder-neutral-800 caret-green-500" inputmode="numeric">
                <p class="text-gray-500 text-sm mt-2">введите сумму траты</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6 shrink-0">
                <button onclick="selectCategory('groceries', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-basket-shopping text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Продукты</span>
                </button>
                <button onclick="selectCategory('family', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-people-roof text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Семья</span>
                </button>
                <button onclick="selectCategory('courier', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-box text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Курьерка</span>
                </button>
                <button onclick="selectCategory('subs', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-rotate-right text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Подписки</span>
                </button>
                <button onclick="selectCategory('force_majeure', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-triangle-exclamation text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Форс-мажор</span>
                </button>
                <button onclick="selectCategory('transport', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-car text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Транспорт</span>
                </button>
                <button onclick="selectCategory('charity', this)" class="cat-btn tap-effect p-3 bg-neutral-900 rounded-2xl border border-neutral-800 flex flex-col items-center gap-2 group [&.active]:border-white [&.active]:bg-white transition-colors">
                    <i class="fa-solid fa-cat text-2xl text-gray-400 group-[.active]:text-black"></i>
                    <span class="text-[10px] sm:text-xs font-medium text-gray-400 group-[.active]:text-black text-center leading-tight">Благотворительность</span>
                </button>
                <button class="cat-btn p-3 bg-neutral-900/50 rounded-2xl border border-neutral-800/50 flex flex-col items-center gap-2 opacity-30 pointer-events-none">
                    <i class="fa-solid fa-file-invoice-dollar text-2xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500 text-center leading-tight">Кредит</span>
                </button>
            </div>

            <div class="mt-auto pb-4 shrink-0">
                <input type="text" id="expense-item" placeholder="На что? (например: Молоко)" class="w-full bg-neutral-900 text-white p-4 rounded-xl border border-neutral-800 focus:outline-none focus:border-green-500 mb-4 text-center">
                <button onclick="saveExpense()" class="tap-effect w-full py-4 rounded-2xl bg-green-600 text-white font-bold text-lg shadow-lg shadow-green-900/20">
                    ЗАПИСАТЬ ТРАТУ
                </button>
            </div>
        </section>

        <!-- SECTION: STATUS (HISTORY) -->
        <section id="section-status" class="hidden h-full px-5 fade-in overflow-y-auto pb-20 w-full">
            <div class="flex items-center justify-between mb-4 mt-6">
                <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest">Завершенные смены</h2>
                <button id="btn-copy-sessions" onclick="copySessionsMD()" class="text-gray-400 p-2 tap-effect hover:text-white transition-colors" title="Копировать статистику смен">
                    <i class="fa-solid fa-copy text-lg"></i>
                </button>
            </div>
            <div id="past-sessions-list" class="space-y-3 mb-8"></div>

            <div class="flex items-center justify-between mb-4 mt-8">
                <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest">История трат</h2>
                <button onclick="openExpensesEdit()" class="text-gray-400 p-2 tap-effect hover:text-white transition-colors" title="Редактировать траты">
                    <i class="fa-solid fa-gear text-lg"></i>
                </button>
            </div>
            
            <div class="bg-neutral-900/50 rounded-2xl border border-white/5 overflow-hidden">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-neutral-800/50 text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-white/5">
                        <tr>
                            <th class="p-3 w-12 text-center">Кат.</th>
                            <th class="p-3">Комментарий</th>
                            <th class="p-3 w-[72px] text-right">Сумма</th>
                        </tr>
                    </thead>
                    <tbody id="history-list" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
            
            <div class="mt-10 mb-6 flex flex-col items-center">
                <button onclick="toggleResetMenu()" class="w-full py-3 rounded-xl border border-neutral-800 text-gray-400 text-xs uppercase tracking-widest hover:bg-neutral-800 transition-colors">
                    СБРОС ДАННЫХ
                </button>
                
                <div id="reset-menu" class="hidden w-full flex-col gap-2 mt-3">
                    <button onclick="requestReset('sessions')" class="w-full py-3 rounded-xl bg-red-950/20 border border-red-900/30 text-red-500 text-xs uppercase tracking-widest tap-effect">Сброс завершенных смен</button>
                    <button onclick="requestReset('expenses')" class="w-full py-3 rounded-xl bg-red-950/20 border border-red-900/30 text-red-500 text-xs uppercase tracking-widest tap-effect">Сброс трат</button>
                </div>
            </div>
        </section>
    </main>

    <!-- === SECTION: ДАННЫЕ (РЕДАКТИРОВАНИЕ И ЦЕЛЬ) === -->
    <div id="section-data" class="hidden fixed inset-0 bg-black z-[70] flex-col overflow-y-auto w-full h-full pb-20 pt-8 px-5 fade-in">
        <div class="flex items-center justify-between mb-6 shrink-0">
            <button onclick="closeDataSection()" class="text-white text-2xl tap-effect p-2 -ml-2">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h2 class="text-white font-display font-bold text-lg tracking-widest">ДАННЫЕ ЗАКАЗОВ</h2>
            <div class="w-8"></div>
        </div>
        
        <div class="mb-6 flex items-center justify-between bg-neutral-900 p-4 rounded-xl border border-neutral-800 shrink-0">
            <span class="text-gray-400 text-sm font-medium">Цель по заказам:</span>
            <input type="number" id="target-orders-input" placeholder="~" class="w-20 bg-neutral-800 text-white text-center font-display p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 border border-neutral-700" onchange="setTargetOrders(this.value)" inputmode="numeric">
        </div>

        <div id="data-orders-list" class="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-6"></div>
    </div>

    <!-- === SECTION: РЕДАКТОР ТРАТ === -->
    <div id="section-expenses-edit" class="hidden fixed inset-0 bg-black z-[80] flex-col overflow-y-auto w-full h-full pb-20 pt-8 px-4 fade-in">
        <div class="flex items-center justify-between mb-6 shrink-0">
            <button onclick="closeExpensesEdit()" class="text-white text-2xl tap-effect p-2 -ml-2">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h2 class="text-white font-display font-bold text-lg tracking-widest">РЕДАКТОР ТРАТ</h2>
            <button id="btn-copy-md" onclick="copyExpensesMD()" class="text-white text-xl tap-effect p-2" title="Копировать MD">
                <i class="fa-solid fa-copy"></i>
            </button>
        </div>

        <div class="grid grid-cols-[auto_1fr_auto_auto] gap-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-neutral-800 pb-2 mb-3 px-2 shrink-0">
            <div class="w-6 text-center">Кат.</div>
            <div>Комментарий</div>
            <div class="text-right w-16">Сумма</div>
            <div class="w-6 text-center">Удал.</div>
        </div>

        <div id="expenses-edit-list" class="flex-1 overflow-y-auto no-scrollbar space-y-2 pb-6"></div>
    </div>

    <!-- === MODAL: CONFIRM RESET === -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-5 opacity-0 transition-opacity duration-300">
        <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col gap-4 text-center">
            <h3 class="text-white font-bold text-xl mb-1">Вы уверены?</h3>
            <p class="text-gray-400 text-sm mb-4">Это действие нельзя отменить.</p>
            <div class="flex gap-2">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 rounded-xl bg-neutral-800 text-gray-300 font-bold text-sm tracking-widest uppercase tap-effect">
                    ОТМЕНА
                </button>
                <button onclick="executeReset()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold text-sm tracking-widest uppercase tap-effect shadow-lg shadow-red-900/20">
                    УДАЛИТЬ
                </button>
            </div>
        </div>
    </div>

    <!-- === BOTTOM NAVIGATION === -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-[calc(28rem-3rem)] h-16 bg-neutral-900/90 backdrop-blur-xl border border-white/10 rounded-2xl flex justify-around items-center z-50 shadow-2xl">
        <button onclick="switchTab('work')" id="nav-work" class="nav-btn text-green-500 flex flex-col items-center gap-1 w-16">
            <i class="fa-solid fa-bolt text-xl"></i>
            <span class="text-[10px] font-bold">WORK</span>
        </button>
        <button onclick="switchTab('spend')" id="nav-spend" class="nav-btn text-gray-500 flex flex-col items-center gap-1 w-16 transition-colors hover:text-gray-300">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">SPEND</span>
        </button>
        <button onclick="switchTab('status')" id="nav-status" class="nav-btn text-gray-500 flex flex-col items-center gap-1 w-16 transition-colors hover:text-gray-300">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[10px] font-bold">STATUS</span>
        </button>
    </nav>

    <!-- Скрытая textarea для копирования в буфер -->
    <textarea id="hidden-copy-area" class="hidden"></textarea>

    <script>

    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW ok!', reg))
                .catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
